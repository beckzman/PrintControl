<div class="container fade-in">
    <div class="header">
        <div class="header-left">
            <a href="javascript:void(0)" (click)="goBack()" class="back-link">
                <span class="back-icon">←</span> Back to Printers
            </a>
            <h1>Settings</h1>
        </div>
    </div>

    <div class="glass-panel main-panel">
        <div class="tabs" style="display: none;">
            <button class="tab-btn active">Printer Types</button>
        </div>


        <!-- PRINTER TYPES TAB -->
        <div *ngIf="activeTab === 'printer-types'" class="tab-content fade-in">
            <div class="section-header">
                <h2>Manage Printer Types</h2>
            </div>

            <!-- Printer Type Form (Add/Edit) -->
            <div class="form-grid glass-panel edit-panel" [class.editing-mode]="editingTypeId !== null">
                <div class="form-title" *ngIf="editingTypeId">✏️ Editing Printer Type (ID: {{ editingTypeId }})</div>
                <div class="form-title" *ngIf="!editingTypeId">➕ Add New Printer Type</div>

                <div class="form-group vendor-select">
                    <label>Vendor</label>
                    <select [(ngModel)]="newPrinterType.vendor_id" class="input-field">
                        <option [ngValue]="undefined" disabled selected>Select Vendor</option>
                        <option *ngFor="let v of vendors" [value]="v.id">{{ v.name }}</option>
                    </select>
                </div>

                <div class="form-group model-input">
                    <label>Model Name</label>
                    <input [(ngModel)]="newPrinterType.name" placeholder="e.g. LaserJet 400" class="input-field">
                </div>

                <div class="form-group full-width">
                    <label>Probes (Monitoring Methods)</label>
                    <div class="probe-checkboxes">
                        <label *ngFor="let probe of availableProbes" class="checkbox-item">
                            <input type="checkbox" [checked]="isProbeEnabled(probe.id)"
                                (change)="toggleProbe(probe.id)">
                            <span>{{ probe.label }}</span>
                        </label>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Discovery Config (JSON)</label>
                    <textarea [(ngModel)]="newPrinterType.discovery_config" rows="5" class="input-field mono"
                        placeholder='{"oid": "1.3.6..."}'></textarea>
                    <div class="error-msg" *ngIf="configError">{{ configError }}</div>
                </div>

                <div class="form-actions full-width">
                    <button class="btn-primary" (click)="handlePrinterTypeSubmit()">{{ submitButtonText }}</button>
                    <button class="btn-secondary" *ngIf="editingTypeId" (click)="cancelEdit()">Cancel Edit</button>
                </div>
            </div>

            <div class="list-container">
                <div class="list-header">Existing Types</div>
                <div *ngFor="let type of printerTypes" class="list-item glass-panel"
                    [class.active-edit]="editingTypeId === type.id">
                    <div class="item-main">
                        <span class="item-name">{{ type.name }}</span>
                        <span class="item-vendor" *ngIf="type.vendor">({{ type.vendor.name }})</span>
                    </div>
                    <div class="item-details">
                        <div class="probe-badges">
                            <span *ngFor="let p of type.probes" class="badge" [ngClass]="p.toLowerCase()">{{ p }}</span>
                        </div>
                        <div class="item-actions">
                            <button class="icon-btn xs" (click)="startEditPrinterType(type)" title="Edit">✏️</button>
                            <button class="icon-btn xs danger" (click)="deletePrinterType(type.id)"
                                title="Delete">🗑️</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
