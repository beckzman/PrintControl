server {
    listen 80;
    server_name localhost;

    # Serve static frontend files for Angular application
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # Angular router support
        try_files $uri $uri/ /index.html;
    }

    # Proxy the API requests starting with /api to the backend
    location /api/ {
        # The trailing slash on proxy_pass strips the /api prefix before forwarding
        proxy_pass http://backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Optional: Log configurations for debugging
    error_log  /var/log/nginx/error.log;
    access_log /var/log/nginx/access.log;
}
